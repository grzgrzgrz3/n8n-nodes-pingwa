<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="pingwa logo">
  <!-- pingwa mark, dark-theme variant: cream body so the penguin stays visible on n8n's dark canvas -->

  <!-- flippers -->
  <ellipse cx="46" cy="150" rx="18" ry="52" fill="#E7DEC8" transform="rotate(14 46 150)"/>
  <ellipse cx="210" cy="150" rx="18" ry="52" fill="#E7DEC8" transform="rotate(-14 210 150)"/>

  <!-- feet -->
  <rect x="86" y="228" width="36" height="16" rx="8" fill="#E6A521"/>
  <rect x="134" y="228" width="36" height="16" rx="8" fill="#E6A521"/>

  <!-- body -->
  <path d="M128 22c-47 0-76 36-76 92 0 66 31 122 76 122s76-56 76-122c0-56-29-92-76-92z" fill="#E7DEC8"/>

  <!-- belly -->
  <path d="M128 88c-29 0-47 25-47 62 0 44 19 78 47 78s47-34 47-78c0-37-18-62-47-62z" fill="#B9AE8C"/>

  <!-- eyes -->
  <circle cx="105" cy="82" r="13" fill="#20201B"/>
  <circle cx="151" cy="82" r="13" fill="#20201B"/>
  <circle cx="108" cy="84" r="6" fill="#E7DEC8"/>
  <circle cx="148" cy="84" r="6" fill="#E7DEC8"/>
  <circle cx="110.5" cy="81.5" r="2" fill="#20201B"/>
  <circle cx="150.5" cy="81.5" r="2" fill="#20201B"/>

  <!-- beak -->
  <path d="M128 96l-13 12c-2 2 0 6 3 6h20c3 0 5-4 3-6l-13-12z" fill="#E6A521"/>

  <!-- scarf band -->
  <path d="M62 116c14 12 42 19 66 19s52-7 66-19c3 8 2 16-2 21-13 11-38 17-64 17s-51-6-64-17c-4-5-5-13-2-21z" fill="#1C9668"/>
  <!-- scarf tail -->
  <path d="M168 148l26-6c5-1 9 3 8 8l-7 36c-1 6-7 9-12 7l-12-4c-5-2-8-7-7-12l4-29z" fill="#1C9668"/>
  <!-- scarf fringe -->
  <path d="M176 190l-2 11M187 192l-2 12M197 187l-2 11" stroke="#1C9668" stroke-width="6" stroke-linecap="round"/>
  <!-- scarf knit line -->
  <path d="M72 126c14 10 36 15 56 15s42-5 56-15" stroke="#20201B" stroke-opacity="0.2" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
