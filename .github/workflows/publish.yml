name: Publish to npm

# Publishes the package with npm provenance so it passes n8n's verified
# community-node security scan. Triggered by publishing a GitHub Release.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # --ignore-scripts skips native builds of dev-only transitive deps
      # (n8n-workflow → isolated-vm). Nothing we build/test/publish loads them;
      # the package ships only dist/.
      - run: npm ci --ignore-scripts

      - run: npm run build

      - run: npm run lint

      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
